<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Result</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">

<h1>Dataset Analysis</h1>

<div class="stats">
    <div class="stat-box">
        <b>Rows</b><br>
        {{ result.df_shape[0] }}
    </div>

    <div class="stat-box">
        <b>Columns</b><br>
        {{ result.df_shape[1] }}
    </div>

    <div class="stat-box">
        <b>Duplicated</b><br>
        {{ result.duplicated }}
    </div>
</div>

<div class="card">
<h2>Dataset Head</h2>
{{ result.head | safe }}
</div>

<div class="card">
<h2>Dataset Tail</h2>
{{ result.tail | safe }}
</div>

<div class="card">
<h2>Data Types</h2>
<pre>{{ result.dtypes }}</pre>
</div>

<div class="card">
<h2>Missing Values</h2>
<pre>{{ result.isnull }}</pre>
</div>

</div>


</body>
</html>
